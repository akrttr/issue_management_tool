services:
  gkt1-backend:
    build:
      context: ../satellite_pass
      dockerfile: Dockerfile
    container_name: gkt1-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - TLE_SOURCE_URL=${TLE_SOURCE_URL:-https://celestrak.org/NORAD/elements/gp.php?GROUP=active&FORMAT=tle}
      - NORAD_ID=${NORAD_ID:-41875}
      - GS_LATITUDE=${GS_LATITUDE:-39.9334}
      - GS_LONGITUDE=${GS_LONGITUDE:-32.8597}
      - GS_ALTITUDE=${GS_ALTITUDE:-0.9}
      - MIN_ELEVATION=${MIN_ELEVATION:-10}
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/api/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    container_name: satellite_tickets_db 
    environment:
      POSTGRES_DB: satellite_tickets 
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: postgres 
    
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
  backup:
    image: postgres:16-alpine
    container_name: satellite_tickets_backup
    restart: always
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: satellite_tickets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Istanbul  # Set your timezone
    volumes:
      - ../db/backups:/backups  # Backups stored on host
      - ../db/backup-scripts:/scripts  # Backup scripts
    entrypoint: /scripts/backup-entrypoint.sh
  

volumes:
  redis-data:
  postgres_data:
  skyfield_data:
  tle_data:
