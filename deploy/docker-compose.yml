services:
  postgres:
    image: postgres:16-alpine
    container_name: sattrack-db
    environment:
      POSTGRES_DB: sattrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - tle_data:/var/lib/postgresql/data
      - ../satellite_pass/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5


  sattrack-api:
    build: ../satellite_pass
    container_name: sattrack-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sattrack
      DB_USER: postgres
      DB_PASSWORD: postgres
      FLASK_ENV: production
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - skyfield_data:/app/skyfield-data
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: satellite_tickets_db 
    environment:
      POSTGRES_DB: satellite_tickets 
      POSTGRES_USER: postgres 
      POSTGRES_PASSWORD: postgres 
    
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
  backup:
    image: postgres:16-alpine
    container_name: satellite_tickets_backup
    restart: always
    depends_on:
      - db
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: satellite_tickets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Europe/Istanbul  # Set your timezone
    volumes:
      - ../db/backups:/backups  # Backups stored on host
      - ../db/backup-scripts:/scripts  # Backup scripts
    entrypoint: /scripts/backup-entrypoint.sh
  

volumes:
  redis-data:
  postgres_data:
  skyfield_data:
  tle_data:
